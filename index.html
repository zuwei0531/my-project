<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業工程估價單</title>
    <!-- 引入 Tailwind CSS 進行快速排版與響應式設計 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 列印時的專屬樣式，讓輸出 PDF 更美觀 */
        @media print {
            body { background-color: white; padding: 0; }
            .no-print { display: none !important; }
            .print-border-none { border: none !important; padding: 0 !important; background: transparent !important; }
            .shadow-lg { box-shadow: none !important; }
            input, textarea { border: none !important; resize: none; background: transparent !important; color: black !important; outline: none; }
            /* 強制列印背景顏色 */
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .max-w-5xl { max-width: 100% !important; margin: 0 !important; padding: 0 !important; }
        }
        
        /* 自定義隱藏滾動條但保持可滾動 */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-8 font-sans text-slate-800 min-h-screen">

    <div class="max-w-5xl mx-auto bg-white p-6 md:p-12 rounded-xl shadow-lg border border-slate-100">
        
        <!-- 頂部操作按鈕 (列印時隱藏) -->
        <div class="flex justify-end mb-6 no-print">
            <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-6 rounded-lg transition-colors duration-200 flex items-center gap-2 shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                列印 / 匯出 PDF
            </button>
        </div>

        <!-- 標題與公司資訊 -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end mb-10 border-b-2 border-slate-200 pb-6 gap-6">
            <div class="w-full md:w-1/2">
                <input type="text" value="您的工程公司名稱" class="text-3xl md:text-4xl font-bold text-slate-900 w-full mb-2 bg-transparent focus:bg-slate-50 border-b border-transparent focus:border-slate-300 outline-none transition-colors" placeholder="輸入公司名稱">
                <textarea rows="3" class="w-full text-sm text-slate-500 bg-transparent focus:bg-slate-50 border border-transparent focus:border-slate-300 rounded outline-none transition-colors" placeholder="輸入公司地址、電話、統編等資訊">地址：台北市信義區測試路123號
電話：(02) 1234-5678
統編：12345678</textarea>
            </div>
            <div class="w-full md:w-auto text-left md:text-right">
                <h1 class="text-4xl font-black text-blue-600 tracking-wider mb-2">估價單</h1>
                <div class="grid grid-cols-[80px_1fr] gap-2 items-center text-sm mt-4">
                    <span class="text-slate-500 font-medium">單號：</span>
                    <input type="text" value="QT-20260303-01" class="border-b border-slate-300 focus:border-blue-500 outline-none px-1 text-right print:text-left md:print:text-right w-full">
                    <span class="text-slate-500 font-medium">日期：</span>
                    <input type="date" id="currentDate" class="border-b border-slate-300 focus:border-blue-500 outline-none px-1 text-right print:text-left md:print:text-right w-full">
                    <span class="text-slate-500 font-medium">有效期限：</span>
                    <input type="text" value="自報價日起 30 天" class="border-b border-slate-300 focus:border-blue-500 outline-none px-1 text-right print:text-left md:print:text-right w-full">
                </div>
            </div>
        </header>

        <!-- 客戶資訊與專案名稱 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
            <div class="bg-slate-50 p-4 rounded-lg print-border-none print:bg-transparent print:p-0">
                <h3 class="text-sm font-bold text-slate-400 mb-2 uppercase tracking-wider">致 (客戶資訊)</h3>
                <input type="text" placeholder="客戶公司名稱或姓名" class="w-full font-bold text-lg mb-1 bg-transparent border-b border-transparent focus:border-slate-300 outline-none">
                <input type="text" placeholder="聯絡人" class="w-full text-sm mb-1 bg-transparent border-b border-transparent focus:border-slate-300 outline-none">
                <input type="text" placeholder="聯絡電話" class="w-full text-sm mb-1 bg-transparent border-b border-transparent focus:border-slate-300 outline-none">
            </div>
            <div class="bg-slate-50 p-4 rounded-lg print-border-none print:bg-transparent print:p-0">
                <h3 class="text-sm font-bold text-slate-400 mb-2 uppercase tracking-wider">專案資訊</h3>
                <input type="text" placeholder="輸入專案名稱 (如：辦公室裝潢工程)" class="w-full font-bold text-lg mb-1 bg-transparent border-b border-transparent focus:border-slate-300 outline-none">
                <input type="text" placeholder="工程地點" class="w-full text-sm mb-1 bg-transparent border-b border-transparent focus:border-slate-300 outline-none">
            </div>
        </div>

        <!-- 報價明細表格 -->
        <div class="mb-8 overflow-x-auto hide-scrollbar">
            <table class="w-full text-left border-collapse min-w-[700px]">
                <thead>
                    <tr class="bg-slate-800 text-white">
                        <th class="py-3 px-4 rounded-tl-lg w-12 text-center">#</th>
                        <th class="py-3 px-4 w-1/3">項目名稱 / 說明</th>
                        <th class="py-3 px-4 w-24 text-right">數量</th>
                        <th class="py-3 px-4 w-20 text-center">單位</th>
                        <th class="py-3 px-4 w-32 text-right">單價</th>
                        <th class="py-3 px-4 w-32 text-right">金額小計</th>
                        <th class="py-3 px-4 rounded-tr-lg w-12 text-center no-print"></th>
                    </tr>
                </thead>
                <tbody id="itemsTableBody">
                    <!-- JavaScript 將在這裡動態插入行 -->
                </tbody>
            </table>
            
            <!-- 新增項目按鈕 -->
            <button onclick="addNewRow()" class="mt-4 text-blue-600 hover:text-blue-800 font-medium text-sm flex items-center gap-1 no-print transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                新增一筆項目
            </button>
        </div>

        <!-- 總計區塊 -->
        <div class="flex flex-col md:flex-row justify-between items-start gap-8">
            <!-- 備註區 -->
            <div class="w-full md:w-1/2">
                <h3 class="text-sm font-bold text-slate-400 mb-2 uppercase tracking-wider">條款與備註</h3>
                <textarea rows="5" class="w-full text-sm text-slate-600 bg-slate-50 p-3 rounded-lg border border-slate-200 focus:border-blue-500 outline-none resize-y print:bg-transparent print:border-none print:p-0" placeholder="在此輸入付款條件、保固說明或注意事項...">1. 本報價單自開立起 30 日內有效。
2. 付款條件：簽約訂金 30%，工程進度達一半請款 40%，完工驗收 30%。
3. 以上報價未含 5% 營業稅 (依下方計算為準)。
4. 施工期間如遇設計變更，費用將另行報價。</textarea>
            </div>
            
            <!-- 計算區 -->
            <div class="w-full md:w-[350px] bg-slate-50 rounded-lg p-6 print-border-none print:bg-transparent print:p-0">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-slate-600">小計 (Subtotal)</span>
                    <span class="font-medium text-slate-800">NT$ <span id="subtotalAmount">0</span></span>
                </div>
                <div class="flex justify-between items-center mb-4 border-b border-slate-200 pb-4">
                    <div class="flex items-center gap-2">
                        <span class="text-slate-600">營業稅 (Tax)</span>
                        <select id="taxRate" onchange="calculateTotal()" class="text-xs border border-slate-300 rounded px-1 py-0.5 outline-none no-print bg-white">
                            <option value="0.05">5%</option>
                            <option value="0">免稅 (0%)</option>
                        </select>
                        <span id="printTaxRate" class="text-xs text-slate-500 hidden print:inline">5%</span>
                    </div>
                    <span class="font-medium text-slate-800">NT$ <span id="taxAmount">0</span></span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-lg font-bold text-slate-800">總計 (Total)</span>
                    <span class="text-2xl font-black text-blue-600">NT$ <span id="totalAmount">0</span></span>
                </div>
            </div>
        </div>

        <!-- 簽名欄位 -->
        <div class="mt-16 pt-8 border-t border-slate-200 grid grid-cols-2 gap-12 no-print print:grid" style="display: none;">
            <div class="text-center">
                <div class="border-b border-slate-400 h-16 mb-2"></div>
                <p class="text-sm text-slate-500">公司簽章</p>
            </div>
            <div class="text-center">
                <div class="border-b border-slate-400 h-16 mb-2"></div>
                <p class="text-sm text-slate-500">客戶確認簽章</p>
            </div>
        </div>
        
        <!-- 列印時才顯示的簽名區塊預設隱藏，使用 css 控制 -->
        <style>
            @media print {
                .print\:grid { display: grid !important; }
            }
        </style>
    </div>

    <script>
        // 設定今日日期
        document.getElementById('currentDate').valueAsDate = new Date();

        // 預設的測試數據
        let items = [
            { id: 1, name: '拆除工程', qty: 1, unit: '式', price: 15000 },
            { id: 2, name: '水電配置管線', qty: 1, unit: '式', price: 28000 },
            { id: 3, name: '油漆粉刷 (得利乳膠漆)', qty: 35, unit: '坪', price: 1200 }
        ];

        // 格式化貨幣
        const formatMoney = (amount) => {
            return Math.round(amount).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        };

        // 渲染表格內容
        function renderTable() {
            const tbody = document.getElementById('itemsTableBody');
            tbody.innerHTML = '';

            items.forEach((item, index) => {
                const amount = item.qty * item.price;
                const tr = document.createElement('tr');
                tr.className = 'border-b border-slate-100 hover:bg-slate-50 transition-colors group';
                
                tr.innerHTML = `
                    <td class="py-3 px-4 text-center text-slate-400 text-sm">${index + 1}</td>
                    <td class="py-3 px-4">
                        <input type="text" value="${item.name}" onchange="updateItem(${item.id}, 'name', this.value)" class="w-full bg-transparent border-b border-transparent focus:border-slate-300 outline-none text-slate-800" placeholder="輸入項目名稱">
                    </td>
                    <td class="py-3 px-4">
                        <input type="number" value="${item.qty}" min="0" step="any" onchange="updateItem(${item.id}, 'qty', parseFloat(this.value) || 0)" class="w-full bg-transparent border-b border-transparent focus:border-slate-300 outline-none text-right text-slate-800" placeholder="0">
                    </td>
                    <td class="py-3 px-4">
                        <input type="text" value="${item.unit}" onchange="updateItem(${item.id}, 'unit', this.value)" class="w-full bg-transparent border-b border-transparent focus:border-slate-300 outline-none text-center text-slate-800" placeholder="如: 坪, 式">
                    </td>
                    <td class="py-3 px-4">
                        <input type="number" value="${item.price}" min="0" step="any" onchange="updateItem(${item.id}, 'price', parseFloat(this.value) || 0)" class="w-full bg-transparent border-b border-transparent focus:border-slate-300 outline-none text-right text-slate-800" placeholder="0">
                    </td>
                    <td class="py-3 px-4 text-right font-medium text-slate-800">
                        ${formatMoney(amount)}
                    </td>
                    <td class="py-3 px-4 text-center no-print">
                        <button onclick="removeItem(${item.id})" class="text-slate-300 hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100 focus:opacity-100" title="刪除項目">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            calculateTotal();
        }

        // 新增一行
        function addNewRow() {
            const newId = items.length > 0 ? Math.max(...items.map(i => i.id)) + 1 : 1;
            items.push({ id: newId, name: '', qty: 1, unit: '式', price: 0 });
            renderTable();
        }

        // 刪除一行
        function removeItem(id) {
            items = items.filter(item => item.id !== id);
            renderTable();
        }

        // 更新數據
        function updateItem(id, field, value) {
            const item = items.find(i => i.id === id);
            if (item) {
                item[field] = value;
                renderTable(); // 重新渲染以更新小計
            }
        }

        // 計算總金額
        function calculateTotal() {
            // 計算小計
            const subtotal = items.reduce((sum, item) => sum + (item.qty * item.price), 0);
            
            // 取得稅率
            const taxRateSelect = document.getElementById('taxRate');
            const taxRate = parseFloat(taxRateSelect.value);
            
            // 同步列印文字的稅率顯示
            document.getElementById('printTaxRate').innerText = taxRateSelect.options[taxRateSelect.selectedIndex].text;

            // 計算稅額與總計
            const tax = subtotal * taxRate;
            const total = subtotal + tax;

            // 更新畫面
            document.getElementById('subtotalAmount').innerText = formatMoney(subtotal);
            document.getElementById('taxAmount').innerText = formatMoney(tax);
            document.getElementById('totalAmount').innerText = formatMoney(total);
        }

        // 初始化渲染
        window.onload = renderTable;
    </script>
</body>
</html>
