<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>工程估價單系統 - 直向專業版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

        body {
            font-family: 'Noto Sans TC', sans-serif;
        }

        /* 隱藏 Chrome/Safari 的數字輸入箭頭 */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* 針對 A4 直向縮減欄位寬度 */
        .col-cat { width: 85px; }      
        .col-floor { width: 65px; }     
        .col-loc { width: 85px; }      
        .col-desc { min-width: 140px; }  /* 彈性空間給說明 */
        .col-unit { width: 55px; }
        .col-qty { width: 60px; }
        .col-price { width: 85px; }
        .col-total { width: 100px; }

        select, input, textarea { 
            border: 1px solid #e2e8f0 !important; 
            border-radius: 8px !important; 
            padding: 6px 8px !important; 
            background-color: white; 
            outline: none;
            font-size: 14px; /* 字體稍微縮小以適應直向 */
            transition: all 0.2s ease;
        }
        
        input:focus, textarea:focus, select:focus {
            border-color: #6366f1 !important;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .sig-canvas { 
            border: 2px dashed #cbd5e1; 
            background-color: #f8fafc; 
            cursor: crosshair; 
            touch-action: none; 
            width: 100%; 
            height: 120px; 
        }
        
        /* 針對 PDF 匯出時的專屬樣式微調 */
        .pdf-exporting {
            /* 讓整體字體再稍微縮緊一點，防止跑版 */
            font-size: 13px !important; 
        }
        .pdf-exporting .no-print { 
            display: none !important; 
        }
        .pdf-exporting input, .pdf-exporting textarea, .pdf-exporting select { 
            border: none !important; 
            background: transparent !important; 
            padding: 0 !important; 
            box-shadow: none !important;
            appearance: none;
            -webkit-appearance: none;
            font-weight: bold; /* 匯出時文字加粗增加辨識度 */
        }
        .pdf-exporting th, .pdf-exporting td {
            padding: 8px 4px !important; /* 壓縮表格上下左右留白 */
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            .bg-slate-800 { background-color: #1e293b !important; -webkit-print-color-adjust: exact; }
            .text-white { color: white !important; -webkit-print-color-adjust: exact; }
            #quotation-content { box-shadow: none !important; border: none !important; width: 100% !important; }
            input, textarea, select { border: none !important; background: transparent !important; padding: 0 !important; }
            .rounded-xl { border-radius: 0 !important; }
        }

        .row-entry:hover { background-color: #f8fafc; }
        #msg-box { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); z-index: 9999; display: none; }
        
        .toggle-btn {
            transition: all 0.2s;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen py-6 md:py-8 text-slate-800 text-sm">

    <div id="msg-box" class="bg-slate-900 text-white px-8 py-3 rounded-xl shadow-2xl font-medium text-sm animate-bounce"></div>

    <button onclick="exportToPDF()" class="no-print fixed bottom-8 right-8 bg-indigo-600 text-white px-6 py-3 rounded-full shadow-2xl font-bold hover:bg-indigo-700 hover
