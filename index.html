<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>工程估價單系統 - 專業美化 PDF 導出版</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 PDF 產生程式庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

        body {
            font-family: 'Noto Sans TC', sans-serif;
        }

        /* 隱藏 Chrome/Safari 的數字輸入箭頭 */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* 自定義表格寬度 */
        .col-cat { width: 130px; }      
        .col-floor { width: 90px; }     
        .col-loc { width: 110px; }      
        .col-desc { min-width: 250px; }  
        .col-unit { width: 80px; }
        .col-qty { width: 80px; }
        .col-price { width: 110px; }
        .col-total { width: 130px; }

        select, input, textarea { 
            border: 1px solid #e2e8f0 !important; 
            border-radius: 8px !important; 
            padding: 8px 12px !important; 
            background-color: white; 
            outline: none;
            font-size: 15px; 
            transition: all 0.2s ease;
        }
        
        input:focus, textarea:focus, select:focus {
            border-color: #6366f1 !important;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .sig-canvas { 
            border: 2px dashed #cbd5e1; 
            background-color: #f8fafc; 
            cursor: crosshair; 
            touch-action: none; 
            width: 100%; 
            height: 140px; 
        }
        
        /* 列印與 PDF 專用樣式 */
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            #quotation-content { box-shadow: none !important; border: none !important; width: 100% !important; margin: 0 !important; }
            .bg-slate-800, .bg-slate-900 { background-color: #0f172a !important; -webkit-print-color-adjust: exact; }
            .text-white { color: white !important; -webkit-print-color-adjust: exact; }
            .rounded-xl, .rounded-2xl { border-radius: 0 !important; }
        }

        #msg-box { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); z-index: 9999; display: none; }
        
        /* 導出按鈕動畫 */
        .pdf-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .pdf-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgba(79, 70, 229, 0.4);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen py-6 md:py-12 text-slate-800">

    <!-- 訊息提示 -->
    <div id="msg-box" class="bg-slate-900 text-white px-8 py-3 rounded-xl shadow-2xl font-medium text-sm animate-bounce"></div>

    <div id="quotation-content" class="max-w-7xl mx-auto bg-white shadow-xl rounded-2xl overflow-hidden border border-slate-200">
        <!-- 頂部視覺表頭 -->
        <div class="bg-slate-900 text-white p-8 md:p-10">
            <div class="flex flex-col md:flex-row justify-between items-start gap-6">
                <div>
                    <h1 class="text-4xl font-black tracking-tight mb-1">工程估價單</h1>
                    <div class="h-1 w-20 bg-indigo-500 rounded-full mb-4"></div>
                    <p class="text-slate-400 text-xs font-medium uppercase tracking-[0.2em]">Professional Quotation</p>
                </div>
                <div class="w-full md:w-auto text-left md:text-right space-y-2">
                    <div class="flex md:justify-end items-center gap-3 text-sm">
                        <span class="text-slate-400 font-medium">報價日期</span>
                        <input type="date" id="quote-date" class="bg-slate-800 border-none text-white py-1 px-3 rounded-lg focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div class="flex md:justify-end items-center gap-3 text-sm">
                        <span class="text-slate-400 font-medium">單據編號</span>
                        <input type="text" id="quote-no" value="QT-20260303-01" class="bg-slate-800 border-none text-white py-1 px-3 rounded-lg text-right focus:ring-2 focus:ring-indigo-500">
                    </div>
                </div>
            </div>

            <!-- 客戶資訊區 -->
            <div class="mt-10 grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-4">
                    <div class="flex flex-col gap-1">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">客戶名稱</label>
                        <input type="text" id="client-name" placeholder="請輸入客戶名稱" class="bg-slate-800/50 border-none text-white focus:bg-slate-800">
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">聯絡電話</label>
                        <input type="text" id="client-phone" placeholder="請輸入聯絡電話" class="bg-slate-800/50 border-none text-white focus:bg-slate-800">
                    </div>
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wider ml-1">施工地點 / 聯絡地址</label>
                    <textarea id="client-address" rows="3" placeholder="請輸入詳細施工地址" class="bg-slate-800/50 border-none text-white focus:bg-slate-800 h-full resize-none"></textarea>
                </div>
            </div>
        </div>

        <!-- 項目明細表格 -->
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse min-w-[1100px]">
                <thead>
                    <tr class="bg-slate-50 text-slate-600 text-[14px] font-black uppercase tracking-wide border-b border-slate-200">
                        <th class="p-5 no-print w-16 text-center">操作</th>
                        <th class="p-5 col-cat text-left">類別</th>
                        <th class="p-5 col-floor text-left">樓層</th>
                        <th class="p-5 col-loc text-left">位置</th>
                        <th class="p-5 col-desc">項目說明</th>
                        <th class="p-5 col-unit text-center">單位</th>
                        <th class="p-5 col-qty text-center">數量</th>
                        <th class="p-5 col-price text-right">單價</th>
                        <th class="p-5 col-total text-right">金額小計</th>
                        <th class="p-5 no-print w-10 text-center"></th>
                    </tr>
                </thead>
                <tbody id="quotation-body">
                    <!-- 錄入行 -->
                    <tr id="draft-row" class="bg-indigo-50/30 border-b border-indigo-100 no-print">
                        <td class="p-3 text-center">
                            <button onclick="commitAndNew()" class="w-10 h-10 bg-indigo-600 text-white rounded-full font-bold shadow-lg hover:bg-indigo-700 active:scale-95 flex items-center justify-center mx-auto transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4" /></svg>
                            </button>
                        </td>
                        <td class="p-2 col-cat"><select id="d-category" onchange="updateSubItems()" class="w-full shadow-sm font-medium text-slate-700"></select></td>
                        <td class="p-2 col-floor">
                            <select id="d-floor" class="w-full p-2 shadow-sm font-medium text-slate-700">
                                <option value="1樓">1F</option><option value="2樓">2F</option><option value="3樓">3F</option><option value="4樓">4F</option><option value="5樓">5F</option><option value="6樓">6F</option><option value="B1">B1</option><option value="頂樓">頂樓</option>
                            </select>
                        </td>
                        <td class="p-2 col-loc">
                            <select id="d-location" class="w-full p-2 shadow-sm font-medium text-slate-700">
                                <option value="客廳">客廳</option><option value="臥室 A">臥室 A</option><option value="臥室 B">臥室 B</option><option value="臥室 C">臥室 C</option><option value="浴室 A">浴室 A</option><option value="浴室 B">浴室 B</option><option value="浴室 C">浴室 C</option><option value="廚房">廚房</option><option value="天花">天花</option><option value="牆面">牆面</option>
                            </select>
                        </td>
                        <td class="p-2 col-desc"><select id="d-item" onchange="updatePrice()" class="w-full shadow-sm font-medium text-slate-700"></select></td>
                        <td class="p-2 col-unit"><select id="d-unit" class="w-full shadow-sm font-medium text-slate-700"><option value="式">式</option><option value="坪">坪</option><option value="m²">m²</option><option value="尺">尺</option><option value="組">組</option></select></td>
                        <td class="p-2 col-qty"><input id="d-qty" type="number" value="1" oninput="calculateDraft()" class="w-full text-center font-bold"></td>
                        <td class="p-2 col-price"><input id="d-price" type="number" value="0" oninput="calculateDraft()" class="w-full text-right font-bold text-indigo-700"></td>
                        <td id="d-total" class="p-4 text-right font-black text-indigo-900 text-lg">0</td>
                        <td></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 底部總結區 -->
        <div class="bg-slate-50 p-8 md:p-10 border-t border-slate-200 flex flex-col lg:flex-row justify-between gap-12">
            <div class="flex-1">
                <div class="flex items-center gap-2 mb-3">
                    <div class="w-1 h-5 bg-indigo-500 rounded-full"></div>
                    <h3 class="font-bold text-slate-700 text-sm uppercase tracking-wider">計價說明與附註</h3>
                </div>
                <textarea id="remarks-input" rows="4" class="w-full text-sm text-slate-500 leading-relaxed bg-white border-slate-200 focus:ring-2 focus:ring-indigo-500 shadow-sm">1. 本單價含基本施工與料件。
2. 管理費包含現場專業監工與環境維護。
3. 本報價單自開立日起 15 日內有效。</textarea>
            </div>
            <div class="w-full lg:w-[480px]">
                <div class="space-y-4">
                    <div class="flex justify-between items-center text-slate-500 text-sm">
                        <span>工程小計</span>
                        <span id="subtotal" class="font-bold text-slate-700 text-base mr-12">0</span>
                    </div>
                    
                    <div class="flex justify-between items-center text-slate-500 text-sm">
                        <span>管理維護 (5%)</span>
                        <div class="flex items-center gap-2">
                            <span id="management-fee" class="font-bold text-slate-700 text-base">0</span>
                            <button id="toggle-mgt" onclick="toggleOption('mgt')" class="no-print bg-indigo-600 text-white w-8 h-8 rounded-lg shadow hover:bg-indigo-700 active:scale-90 flex items-center justify-center transition-all" title="移除/計入">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                            </button>
                        </div>
                    </div>
                    
                    <div class="flex justify-between items-center text-red-400 text-sm">
                        <span class="text-red-400">營業稅 (5%)</span>
                        <div class="flex items-center gap-2">
                            <span id="tax-fee" class="font-bold text-red-500 text-base">0</span>
                            <button id="toggle-tax" onclick="toggleOption('tax')" class="no-print bg-indigo-600 text-white w-8 h-8 rounded-lg shadow hover:bg-indigo-700 active:scale-90 flex items-center justify-center transition-all" title="移除/計入">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                            </button>
                        </div>
                    </div>

                    <div class="pt-6 border-t-2 border-slate-200 mt-4">
                        <div class="flex justify-between items-center text-black">
                            <span class="font-black text-2xl">總報價金額</span>
                            <span id="grand-total" class="text-6xl font-black">0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 簽名區域 -->
        <div class="p-8 md:p-12 grid grid-cols-1 md:grid-cols-2 gap-12 bg-white border-t border-slate-100">
            <div>
                <div class="flex justify-between mb-3 items-end">
                    <span class="text-sm font-bold text-slate-700">甲方簽署 (客戶確認)</span>
                    <button onclick="clearSig('sig-party-a')" class="no-print text-indigo-600 text-xs font-bold px-2 py-1">清除</button>
                </div>
                <canvas id="sig-party-a" class="sig-canvas rounded-xl shadow-inner"></canvas>
            </div>
            <div>
                <div class="flex justify-between mb-3 items-end">
                    <span class="text-sm font-bold text-slate-700">乙方簽署 (承包單位)</span>
                    <button onclick="clearSig('sig-party-b')" class="no-print text-indigo-600 text-xs font-bold px-2 py-1">清除</button>
                </div>
                <canvas id="sig-party-b" class="sig-canvas rounded-xl shadow-inner"></canvas>
            </div>
        </div>
    </div>

    <!-- 底部導出按鈕 (懸浮式) -->
    <div class="fixed bottom-8 right-8 no-print flex flex-col gap-4">
        <button onclick="exportToPDF()" class="pdf-btn bg-indigo-600 text-white flex items-center gap-2 px-8 py-4 rounded-2xl font-black shadow-2xl active:scale-95 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            導出 PDF 報價單
        </button>
    </div>

    <!-- 底部版權 -->
    <div class="max-w-6xl mx-auto mt-10 text-center text-slate-400 no-print pb-24 uppercase tracking-widest text-[10px]">
        © 2026 Quotation Management System - Professional Edition
    </div>

    <script>
        const projectData = {
            "保護工程": { "items": ["公設保護(電梯/走廊)", "室內地坪保護", "家具防塵套件"], "prices": [800, 600, 3500] },
            "拆除工程": { "items": ["紅磚牆拆除", "磁磚剔除(牆/地)", "天花板拆除", "廢棄物清運費"], "prices": [2500, 1800, 1200, 9500] },
            "泥作工程": { "items": ["牆面水泥粉光", "防水工程", "地磚舖貼", "牆面砌磚", "地板水泥粉光"], "prices": [4500, 2500, 6500, 5500, 3500] },
            "木作工程": { "items": ["矽酸鈣板平頂天花", "系統櫃(高櫃)", "造型電視牆", "木作隔間牆"], "prices": [3800, 6500, 12000, 4500] },
            "油漆工程": { "items": ["全室二底三面漆", "局部批土修補", "造型牆跳色費"], "prices": [1500, 500, 2500] },
            "水電工程": { "items": ["開關插座面板更新", "全室電路抽換", "燈具安裝(基本)", "冷熱水管遷移"], "prices": [850, 45000, 350, 3500] }
        };

        let includeMgt = true;
        let includeTax = true;

        function showMsg(text) {
            const b = document.getElementById('msg-box');
            b.innerText = text; 
            b.style.display = 'block';
            setTimeout(() => b.style.display = 'none', 3000);
        }

        function init() {
            document.getElementById('quote-date').valueAsDate = new Date();
            const cat = document.getElementById('d-category');
            cat.innerHTML = '<option value="">-- 選取類別 --</option>';
            Object.keys(projectData).forEach(c => cat.add(new Option(c, c)));
            setupSignatures();
            calculateTotal();
        }

        function updateSubItems() {
            const cat = document.getElementById('d-category').value;
            const item = document.getElementById('d-item');
            item.innerHTML = '<option value="">-- 選取項目 --</option>';
            if (projectData[cat]) projectData[cat].items.forEach((it, idx) => {
                const opt = new Option(it, it);
                opt.dataset.price = projectData[cat].prices[idx];
                item.add(opt);
            });
            calculateDraft();
        }

        function updatePrice() {
            const sel = document.getElementById('d-item');
            const opt = sel.options[sel.selectedIndex];
            if (opt && opt.dataset.price) document.getElementById('d-price').value = opt.dataset.price;
            calculateDraft();
        }

        function calculateDraft() {
            const q = parseFloat(document.getElementById('d-qty').value) || 0;
            const p = parseFloat(document.getElementById('d-price').value) || 0;
            document.getElementById('d-total').innerText = Math.round(q * p).toLocaleString();
        }

        function commitAndNew() {
            const cat = document.getElementById('d-category').value;
            const item = document.getElementById('d-item').value;
            if (!cat || !item) return showMsg("請選取完整的類別與項目！");

            const floor = document.getElementById('d-floor').value;
            const loc = document.getElementById('d-location').value;
            const q = document.getElementById('d-qty').value;
            const p = document.getElementById('d-price').value;
            const u = document.getElementById('d-unit').value;
            const totalVal = Math.round(parseFloat(q) * parseFloat(p));

            const row = document.createElement('tr');
            row.className = "border-b border-slate-100 row-entry transition-colors group";
            
            row.innerHTML = `
                <td class="p-4 no-print text-center">
                    <span class="w-1.5 h-1.5 bg-indigo-300 rounded-full inline-block"></span>
                </td>
                <td class="p-5 text-left font-medium text-slate-700 col-cat">${cat}</td>
                <td class="p-5 text-left font-bold text-slate-600 col-floor">${floor}</td>
                <td class="p-5 text-left text-slate-400 text-sm col-loc">${loc}</td>
                <td class="p-5 text-left text-slate-800 font-bold col-desc">${item}</td>
                <td class="p-5 text-center text-slate-500 col-unit">${u}</td>
                <td class="p-5 text-center font-bold text-slate-700 col-qty">${q}</td>
                <td class="p-5 text-right font-medium text-slate-600 col-price">${parseFloat(p).toLocaleString()}</td>
                <td class="p-5 text-right font-black text-slate-900 col-total row-total" data-val="${totalVal}">${totalVal.toLocaleString()}</td>
                <td class="p-5 no-print text-center">
                    <button onclick="this.closest('tr').remove();calculateTotal();" class="text-slate-300 hover:text-red-500 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    </button>
                </td>
            `;
            document.getElementById('quotation-body').insertBefore(row, document.getElementById('draft-row').nextSibling);
            
            document.getElementById('d-category').value = ""; document.getElementById('d-item').innerHTML = "";
            document.getElementById('d-qty').value = 1; document.getElementById('d-price').value = 0;
            calculateDraft(); calculateTotal();
            showMsg("已成功新增項目");
        }

        function toggleOption(type) {
            if (type === 'mgt') {
                includeMgt = !includeMgt;
                const btn = document.getElementById('toggle-mgt');
                btn.className = includeMgt ? 
                    "no-print bg-indigo-600 text-white w-8 h-8 rounded-lg shadow hover:bg-indigo-700 active:scale-90 flex items-center justify-center transition-all" : 
                    "no-print bg-slate-200 text-slate-400 w-8 h-8 rounded-lg shadow hover:bg-slate-300 active:scale-90 flex items-center justify-center transition-all";
            } else if (type === 'tax') {
                includeTax = !includeTax;
                const btn = document.getElementById('toggle-tax');
                btn.className = includeTax ? 
                    "no-print bg-indigo-600 text-white w-8 h-8 rounded-lg shadow hover:bg-indigo-700 active:scale-90 flex items-center justify-center transition-all" : 
                    "no-print bg-slate-200 text-slate-400 w-8 h-8 rounded-lg shadow hover:bg-slate-300 active:scale-90 flex items-center justify-center transition-all";
            }
            calculateTotal();
        }

        function calculateTotal() {
            let sub = 0;
            document.querySelectorAll('.row-total').forEach(el => sub += parseFloat(el.dataset.val) || 0);
            const mgt = includeMgt ? Math.round(sub * 0.05) : 0; 
            const tax = includeTax ? Math.round((sub + mgt) * 0.05) : 0;
            document.getElementById('subtotal').innerText = sub.toLocaleString();
            document.getElementById('management-fee').innerText = mgt.toLocaleString();
            document.getElementById('tax-fee').innerText = tax.toLocaleString();
            document.getElementById('grand-total').innerText = (sub + mgt + tax).toLocaleString();
        }

        // PDF 導出邏輯
        async function exportToPDF() {
            const element = document.getElementById('quotation-content');
            const clientName = document.getElementById('client-name').value || '未命名客戶';
            const quoteNo = document.getElementById('quote-no').value || 'QT-000';
            
            showMsg("正在優化 A4 排版並產生 PDF...");

            // 設定優化參數
            const opt = {
                margin:       [10, 10, 10, 10], // 上右下左邊距 (mm)
                filename:     `工程估價單_${clientName}_${quoteNo}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { 
                    scale: 3, 
                    useCORS: true, 
                    letterRendering: true,
                    logging: false,
                    windowWidth: 1200 // 強制模擬桌機寬度進行捕捉，解決手機排版問題
                },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // 執行導出
            html2pdf().set(opt).from(element).save().then(() => {
                showMsg("PDF 導出成功！");
            }).catch(err => {
                console.error(err);
                showMsg("導出失敗，請再試一次。");
            });
        }

        function setupSignatures() {
            ['sig-party-a', 'sig-party-b'].forEach(id => {
                const canvas = document.getElementById(id);
                const ctx = canvas.getContext('2d');
                let drawing = false;
                
                // 針對高畫質螢幕優化 Canvas
                const ratio = window.devicePixelRatio || 1;
                canvas.width = canvas.offsetWidth * ratio; 
                canvas.height = canvas.offsetHeight * ratio;
                ctx.scale(ratio, ratio);
                
                ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.strokeStyle = '#0f172a';
                
                const getPos = (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const cx = (e.touches ? e.touches[0].clientX : e.clientX);
                    const cy = (e.touches ? e.touches[0].clientY : e.clientY);
                    return { x: cx - rect.left, y: cy - rect.top };
                };
                const start = (e) => { drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); if(e.touches) e.preventDefault(); };
                const move = (e) => { if(!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); if(e.touches) e.preventDefault(); };
                
                canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move); window.addEventListener('mouseup', () => drawing = false);
                canvas.addEventListener('touchstart', start, {passive:false}); canvas.addEventListener('touchmove', move, {passive:false}); canvas.addEventListener('touchend', () => drawing = false);
            });
        }

        function clearSig(id) { 
            const canvas = document.getElementById(id);
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            setupSignatures();
        }

        window.onload = init;
    </script>
</body>
</html>
