<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>專業工程估價單系統 - Vercel 高清版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* 避免擠壓的關鍵 CSS */
        .table-cell-nowrap { white-space: nowrap !important; }
        .col-min-width { min-width: 80px; }
        
        select, input { 
            border: 1px solid #e2e8f0 !important; 
            border-radius: 4px !important; 
            padding: 4px 6px !important; 
            background-color: white; 
            outline: none;
        }
        
        .sig-canvas { 
            border: 2px dashed #cbd5e1; 
            background-color: #f8fafc; 
            cursor: crosshair; 
            touch-action: none; 
            width: 100%; 
            height: 120px; 
        }

        /* PDF 導出模式下的修正樣式 */
        .is-exporting #quotation-content {
            width: 1100px !important; /* 強制寬度防止擠壓 */
            padding: 20px !important;
            box-shadow: none !important;
        }
        .is-exporting .no-print, .is-exporting #draft-row { display: none !important; }
        .is-exporting input, .is-exporting textarea { border: none !important; background: transparent !important; }
        
        tr { page-break-inside: avoid !important; }
        .row-entry:hover { background-color: #f1f5f9; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen py-4 md:py-8 font-sans text-slate-900">

    <div id="quotation-content" class="max-w-6xl mx-auto bg-white shadow-2xl rounded-xl overflow-hidden border border-slate-200">
        <!-- 抬頭 -->
        <div class="bg-slate-800 text-white p-6 md:p-10">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-3xl font-black tracking-tight mb-1">工程估價單</h1>
                    <div class="h-1 w-20 bg-indigo-500"></div>
                </div>
                <div class="text-right text-xs md:text-sm text-slate-400">
                    <p>報價日期：2026-03-02</p>
                    <p>估價單號：20260302-01</p>
                </div>
            </div>
            
            <div class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-8 text-sm">
                <div class="space-y-4">
                    <div class="flex items-center group">
                        <span class="text-slate-500 w-20 flex-shrink-0 font-bold">專案名稱</span>
                        <input type="text" id="project-name" placeholder="輸入名稱" class="bg-transparent border-b border-slate-600 focus:border-white outline-none flex-1 text-white py-1">
                    </div>
                    <div class="flex items-center group">
                        <span class="text-slate-500 w-20 flex-shrink-0 font-bold">客戶姓名</span>
                        <input type="text" id="client-name" placeholder="輸入抬頭" class="bg-transparent border-b border-slate-600 focus:border-white outline-none flex-1 text-white py-1">
                    </div>
                </div>
                <div class="flex items-start group">
                    <span class="text-slate-500 w-20 flex-shrink-0 font-bold pt-1">施工地址</span>
                    <textarea id="address" rows="2" placeholder="輸入施工地址" class="bg-transparent border-b border-slate-600 focus:border-white outline-none flex-1 resize-none text-white py-1"></textarea>
                </div>
            </div>
        </div>

        <!-- 表格區域 -->
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-50 text-slate-500 text-[11px] font-bold uppercase tracking-widest border-b">
                        <th class="p-4 no-print w-12 text-center">新增</th>
                        <th class="p-4 table-cell-nowrap">類別</th>
                        <th class="p-4 table-cell-nowrap">樓層</th>
                        <th class="p-4 table-cell-nowrap">位置</th>
                        <th class="p-4 min-w-[200px]">項目說明</th>
                        <th class="p-4 text-center">單位</th>
                        <th class="p-4 text-center">數量</th>
                        <th class="p-4 text-right">單價</th>
                        <th class="p-4 text-right">小計</th>
                        <th class="p-4 no-print w-10"></th>
                    </tr>
                </thead>
                <tbody id="quotation-body">
                    <!-- 錄入列 -->
                    <tr id="draft-row" class="bg-indigo-50/30 border-b-2 border-indigo-100 no-print">
                        <td class="p-4 text-center">
                            <button onclick="commitAndNew()" class="w-9 h-9 bg-indigo-600 text-white rounded-full font-bold shadow-md hover:scale-105 transition-all">+</button>
                        </td>
                        <td class="p-2"><select id="d-category" onchange="updateSubItems()" class="w-full text-sm"></select></td>
                        <td class="p-2"><select id="d-floor" class="w-full text-sm">
                            <option value="1樓">1樓</option><option value="2樓">2樓</option><option value="3樓">3樓</option><option value="4樓">4樓</option><option value="5樓">5樓</option><option value="6樓">6樓</option><option value="地下室">地下室</option><option value="頂樓">頂樓</option><option value="樓梯間">樓梯間</option><option value="麒麟地">麒麟地</option>
                        </select></td>
                        <td class="p-2"><select id="d-location" class="w-full text-sm">
                            <option value="無">無</option><option value="樓梯間">樓梯間</option><option value="天花板">天花板</option><option value="地板">地板</option><option value="牆面">牆面</option><option value="前">前</option><option value="中">中</option><option value="後">後</option><option value="上">上</option><option value="下">下</option>
                        </select></td>
                        <td class="p-2"><select id="d-item" onchange="updatePrice()" class="w-full text-sm"></select></td>
                        <td class="p-2"><select id="d-unit" class="w-full text-xs">
                            <option value="坪">坪</option><option value="m²">m²</option><option value="式">式</option><option value="尺">尺</option><option value="組">組</option><option value="車">車</option>
                        </select></td>
                        <td class="p-2"><input id="d-qty" type="number" value="1" oninput="calculateDraft()" class="w-full text-center text-sm font-bold"></td>
                        <td class="p-2"><input id="d-price" type="number" value="0" oninput="calculateDraft()" class="w-full text-right font-bold text-indigo-600 text-sm"></td>
                        <td id="d-total" class="p-4 text-right font-black text-indigo-700 text-sm italic">0</td>
                        <td></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 總計區 -->
        <div class="bg-slate-50 p-6 md:p-10 border-t flex flex-col md:flex-row justify-between gap-8">
            <div class="text-[11px] text-slate-400 md:w-1/2">
                <p class="font-bold text-slate-500 mb-1 uppercase">備註說明 / Notes</p>
                <p>1. 本報價含基本施工。 2. 管理費含現場監工支出。 3. 不含政府規費、鄰損鑑定。</p>
            </div>
            <div class="md:w-80 space-y-3 text-sm">
                <div class="flex justify-between"><span>工程小計</span><span id="subtotal" class="font-bold text-slate-700">0</span></div>
                <div class="flex justify-between"><span>管理維護費 (5%)</span><span id="management-fee" class="font-bold text-slate-700">0</span></div>
                <div class="flex justify-between text-red-500"><span>營業稅 (5%)</span><span id="tax-fee" class="font-bold">0</span></div>
                <div class="flex justify-between pt-4 border-t-2 border-slate-300 text-xl font-black text-indigo-700">
                    <span>總報價金額</span>
                    <span id="grand-total">0</span>
                </div>
            </div>
        </div>

        <!-- 簽名區 -->
        <div class="p-8 md:p-12 grid grid-cols-1 md:grid-cols-2 gap-12 bg-white border-t">
            <div>
                <div class="flex justify-between items-center mb-1"><span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">甲方簽署 (客戶)</span><button onclick="clearSig('sig-party-a')" class="no-print text-indigo-600 text-[10px] font-bold">清除</button></div>
                <canvas id="sig-party-a" class="sig-canvas rounded-lg"></canvas>
            </div>
            <div>
                <div class="flex justify-between items-center mb-1"><span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">乙方簽署 (承包商)</span><button onclick="clearSig('sig-party-b')" class="no-print text-indigo-600 text-[10px] font-bold">清除</button></div>
                <canvas id="sig-party-b" class="sig-canvas rounded-lg"></canvas>
            </div>
        </div>
    </div>

    <!-- 按鈕 -->
    <div class="max-w-6xl mx-auto mt-8 flex flex-wrap justify-end gap-4 px-4 no-print pb-24">
        <button onclick="exportExcel()" class="bg-emerald-600 text-white px-8 py-3 rounded-lg font-bold shadow hover:bg-emerald-700 transition">導出 Excel</button>
        <button id="pdf-btn" onclick="exportPDF()" class="bg-indigo-600 text-white px-8 py-3 rounded-lg font-bold shadow hover:bg-indigo-800 transition flex items-center">
            <span id="pdf-text">導出 PDF (Vercel 優化版)</span>
            <div id="loader" class="hidden ml-2 animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"></div>
        </button>
    </div>

    <script>
        const projectData = {
            "保護工程": { "items": ["公設保護(電梯/走廊)", "室內地坪保護", "家具防塵套件"], "units": ["坪", "式"], "prices": [800, 600, 3500] },
            "拆除工程": { "items": ["紅磚牆拆除", "磁磚剔除(牆/地)", "天花板拆除", "廢棄物清運費"], "units": ["坪", "車"], "prices": [2500, 1800, 1200, 9500] },
            "泥作工程": { "items": ["牆面水泥粉光", "防水工程", "地磚舖貼", "牆面砌磚"], "units": ["坪", "m²"], "prices": [4500, 2500, 6500, 5500] },
            "木作工程": { "items": ["矽酸鈣板平頂天花", "系統櫃(高櫃)", "造型電視牆", "木作隔間牆"], "units": ["坪", "尺"], "prices": [3800, 6500, 12000, 4500] },
            "油漆工程": { "items": ["全室二底三面漆", "局部批土修補", "造型牆跳色費"], "units": ["坪", "m²"], "prices": [1500, 500, 2500] },
            "水電工程": { "items": ["開關插座面板更新", "全室電路抽換", "燈具安裝(基本)", "冷熱水管遷移"], "units": ["組", "式", "處"], "prices": [850, 45000, 350, 3500] }
        };

        function init() {
            const cat = document.getElementById('d-category');
            cat.innerHTML = '<option value="">類別</option>';
            Object.keys(projectData).forEach(c => cat.add(new Option(c, c)));
            setupSignatures();
        }

        function updateSubItems() {
            const cat = document.getElementById('d-category').value;
            const item = document.getElementById('d-item');
            item.innerHTML = '<option value="">選擇項目</option>';
            if (projectData[cat]) projectData[cat].items.forEach((it, idx) => {
                const opt = new Option(it, it);
                opt.dataset.price = projectData[cat].prices[idx];
                item.add(opt);
            });
            calculateDraft();
        }

        function updatePrice() {
            const sel = document.getElementById('d-item');
            const opt = sel.options[sel.selectedIndex];
            if (opt && opt.dataset.price) document.getElementById('d-price').value = opt.dataset.price;
            calculateDraft();
        }

        function calculateDraft() {
            const q = parseFloat(document.getElementById('d-qty').value) || 0;
            const p = parseFloat(document.getElementById('d-price').value) || 0;
            document.getElementById('d-total').innerText = (q * p).toLocaleString();
            calculateTotal();
        }

        function commitAndNew() {
            const cat = document.getElementById('d-category').value;
            const floor = document.getElementById('d-floor').value;
            const loc = document.getElementById('d-location').value;
            const item = document.getElementById('d-item').value;
            if (!cat || !item) return;

            const q = document.getElementById('d-qty').value;
            const p = document.getElementById('d-price').value;
            const u = document.getElementById('d-unit').value;
            const total = (parseFloat(q) * parseFloat(p)).toLocaleString();

            const row = document.createElement('tr');
            row.className = "border-b text-sm transition-all hover:bg-slate-50";
            row.innerHTML = `<td class="p-4 no-print text-center text-slate-300">●</td><td class="p-4 font-bold text-slate-600">${cat}</td><td class="p-4 text-slate-500">${floor}</td><td class="p-4 text-slate-500">${loc}</td><td class="p-4 font-medium text-slate-800">${item}</td><td class="p-4 text-center text-slate-400 text-xs">${u}</td><td class="p-4 text-center font-bold">${q}</td><td class="p-4 text-right text-slate-500">${parseFloat(p).toLocaleString()}</td><td class="p-4 text-right font-black text-indigo-700 row-total">${total}</td><td class="p-4 no-print text-center"><button onclick="this.closest('tr').remove();calculateTotal();" class="text-slate-300 hover:text-red-500 font-bold transition-all">✕</button></td>`;
            document.getElementById('quotation-body').insertBefore(row, document.getElementById('draft-row').nextSibling);
            
            document.getElementById('d-category').value = ""; document.getElementById('d-item').innerHTML = "";
            document.getElementById('d-qty').value = 1; document.getElementById('d-price').value = 0;
            calculateDraft();
        }

        function calculateTotal() {
            let sub = 0;
            document.querySelectorAll('.row-total').forEach(el => sub += parseFloat(el.innerText.replace(/,/g, '')) || 0);
            const mgt = Math.round(sub * 0.05); const tax = Math.round((sub + mgt) * 0.05);
            document.getElementById('subtotal').innerText = sub.toLocaleString();
            document.getElementById('management-fee').innerText = mgt.toLocaleString();
            document.getElementById('tax-fee').innerText = tax.toLocaleString();
            document.getElementById('grand-total').innerText = (sub + mgt + tax).toLocaleString();
        }

        function exportExcel() {
            const data = [["類別", "樓層", "位置", "項目說明", "單位", "數量", "單價", "小計"]];
            document.querySelectorAll('#quotation-body tr:not(#draft-row)').forEach(tr => {
                const tds = tr.querySelectorAll('td');
                data.push([tds[1].innerText, tds[2].innerText, tds[3].innerText, tds[4].innerText, tds[5].innerText, tds[6].innerText, tds[7].innerText, tds[8].innerText]);
            });
            const ws = XLSX.utils.aoa_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "估價單");
            XLSX.writeFile(wb, "工程報價單.xlsx");
        }

        // --- 核心優化：解決 PDF 擠壓與標題跑位 ---
        async function exportPDF() {
            const content = document.getElementById('quotation-content');
            const btn = document.getElementById('pdf-btn');
            const text = document.getElementById('pdf-text');
            const loader = document.getElementById('loader');

            text.innerText = "生成高品質報價單..."; loader.classList.remove('hidden'); btn.disabled = true;

            // 1. 強制重置捲軸並加上 PDF 專用排版類別
            window.scrollTo(0, 0);
            document.body.classList.add('is-exporting');
            
            // 2. 特殊處理：將 Canvas 簽名轉為高品質圖片，防止導出遺失
            const sigA = document.getElementById('sig-party-a');
            const sigB = document.getElementById('sig-party-b');
            const imgA = document.createElement('img');
            const imgB = document.createElement('img');
            imgA.src = sigA.toDataURL('image/png');
            imgB.src = sigB.toDataURL('image/png');
            imgA.className = imgB.className = "w-full h-[120px] object-contain border border-slate-100 rounded-lg";
            
            const parentA = sigA.parentNode;
            const parentB = sigB.parentNode;
            parentA.replaceChild(imgA, sigA);
            parentB.replaceChild(imgB, sigB);

            const opt = {
                margin: 0.2,
                filename: `${document.getElementById('project-name').value || '工程'}_估價單.pdf`,
                image: { type: 'jpeg', quality: 1.0 },
                html2canvas: { 
                    scale: 3, // RTX 3070 效能全開，Scale 3 兼顧高品質與穩定性
                    useCORS: true, 
                    scrollY: 0,
                    scrollX: 0,
                    windowWidth: 1100 // 強制以寬螢幕視角擷取，解決手機擠壓斷行
                },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };

            try {
                // 執行生成
                await html2pdf().set(opt).from(content).save();
            } catch (err) {
                console.error(err);
                alert("PDF 生成失敗");
            } finally {
                // 恢復原狀
                parentA.replaceChild(sigA, imgA);
                parentB.replaceChild(sigB, imgB);
                document.body.classList.remove('is-exporting');
                text.innerText = "導出 PDF 報價單"; loader.classList.add('hidden'); btn.disabled = false;
            }
        }

        function setupSignatures() {
            ['sig-party-a', 'sig-party-b'].forEach(id => {
                const canvas = document.getElementById(id);
                const ctx = canvas.getContext('2d');
                let drawing = false;
                const ratio = window.devicePixelRatio || 1;
                canvas.width = canvas.offsetWidth * ratio; canvas.height = canvas.offsetHeight * ratio;
                ctx.scale(ratio, ratio);
                ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.strokeStyle = '#1e293b';
                const getPos = (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const cx = (e.touches ? e.touches[0].clientX : e.clientX);
                    const cy = (e.touches ? e.touches[0].clientY : e.clientY);
                    return { x: cx - rect.left, y: cy - rect.top };
                };
                const start = (e) => { drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); if(e.touches) e.preventDefault(); };
                const move = (e) => { if(!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); if(e.touches) e.preventDefault(); };
                canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move); window.addEventListener('mouseup', () => drawing = false);
                canvas.addEventListener('touchstart', start, {passive:false}); canvas.addEventListener('touchmove', move, {passive:false}); canvas.addEventListener('touchend', () => drawing = false);
            });
        }
        function clearSig(id) { 
            const canvas = document.getElementById(id);
            const ctx = canvas.getContext('2d');
            const ratio = window.devicePixelRatio || 1;
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
            setupSignatures();
        }
        window.onload = init;
    </script>
</body>
</html>
