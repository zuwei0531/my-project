<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>工程估價單系統 - 純淨填報版</title>
    <!-- 引入 Tailwind CSS 進行響應式設計 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 網頁 UI 寬度控制 */
        .table-cell-min { min-width: 80px; }
        .table-cell-mid { min-width: 150px; }
        
        select, input, textarea { 
            border: 1px solid #cbd5e1 !important; 
            border-radius: 6px !important; 
            padding: 6px !important; 
            background-color: white; 
            outline: none;
            font-size: 14px;
        }
        
        input:focus, textarea:focus {
            border-color: #4f46e5 !important;
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.1);
        }

        .sig-canvas { border: 2px dashed #e2e8f0; background-color: #f8fafc; cursor: crosshair; touch-action: none; width: 100%; height: 110px; }
        
        /* 基礎列印設定 */
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            .bg-slate-800 { background-color: #1e293b !important; -webkit-print-color-adjust: exact; }
            .text-white { color: white !important; -webkit-print-color-adjust: exact; }
        }

        .row-entry:hover { background-color: #f8fafc; }
        #msg-box { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: none; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen py-4 md:py-8 font-sans text-slate-900">

    <!-- 訊息提示 -->
    <div id="msg-box" class="bg-indigo-600 text-white px-6 py-3 rounded-full shadow-2xl font-bold text-sm"></div>

    <div id="quotation-content" class="max-w-5xl mx-auto bg-white shadow-2xl rounded-xl overflow-hidden border border-slate-200">
        <!-- 表頭 -->
        <div class="header-info bg-slate-800 text-white p-6 md:p-8">
            <div class="flex flex-col md:flex-row justify-between items-start gap-4">
                <div>
                    <h1 class="text-3xl md:text-4xl font-black tracking-tighter">工程估價單</h1>
                    <p class="text-slate-400 mt-1 text-xs md:text-sm tracking-widest uppercase">Quotation / Estimate</p>
                </div>
                <div class="text-left md:text-right text-xs md:text-sm text-slate-400 space-y-1">
                    <div class="flex md:justify-end items-center gap-2">
                        <span>報價日期：</span>
                        <input type="date" id="quote-date" class="bg-transparent border-none p-0 text-white focus:ring-0">
                    </div>
                    <div class="flex md:justify-end items-center gap-2">
                        <span>估價單號：</span>
                        <input type="text" id="quote-no" value="QT-20260303-01" class="bg-transparent border-none p-0 text-white focus:ring-0 text-right">
                    </div>
                </div>
            </div>

            <!-- 客戶資訊區 -->
            <div class="client-section mt-6 grid grid-cols-1 md:grid-cols-2 gap-6 text-sm">
                <div class="space-y-3">
                    <div class="flex items-center gap-3">
                        <span class="w-20 text-slate-400 shrink-0">專案名稱</span>
                        <input type="text" id="project-name" placeholder="請輸入案件名稱" class="bg-slate-700/40 border-none focus:bg-slate-700 outline-none flex-1 text-white py-1">
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="w-20 text-slate-400 shrink-0">客戶名稱</span>
                        <input type="text" id="client-name" placeholder="客戶抬頭 / 姓名" class="bg-slate-700/40 border-none focus:bg-slate-700 outline-none flex-1 text-white py-1">
                    </div>
                    <div class="flex items-center gap-3">
                        <span class="w-20 text-slate-400 shrink-0">聯絡電話</span>
                        <input type="text" id="client-phone" placeholder="聯絡電話" class="bg-slate-700/40 border-none focus:bg-slate-700 outline-none flex-1 text-white py-1">
                    </div>
                </div>
                <div class="flex flex-col gap-2">
                    <span class="text-slate-400">施工地點 / 聯絡地址</span>
                    <textarea id="client-address" rows="3" placeholder="請輸入詳細地址" class="bg-slate-700/40 border-none focus:bg-slate-700 outline-none w-full resize-none text-white py-1 leading-tight"></textarea>
                </div>
            </div>
        </div>

        <!-- 表格區域 -->
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse min-w-[850px]">
                <thead>
                    <tr class="bg-slate-50 text-slate-500 text-[10px] font-bold uppercase tracking-wider border-b">
                        <th class="p-4 no-print w-14 text-center">新增</th>
                        <th class="p-4 w-32">類別</th>
                        <th class="p-4 w-20 text-center">樓層</th>
                        <th class="p-4 w-20 text-center">位置</th>
                        <th class="p-4 table-cell-mid">項目說明</th>
                        <th class="p-4 w-16 text-center">單位</th>
                        <th class="p-4 w-16 text-center">數量</th>
                        <th class="p-4 w-28 text-right">單價</th>
                        <th class="p-4 w-32 text-right">金額小計</th>
                        <th class="p-4 no-print w-10 text-center">刪</th>
                    </tr>
                </thead>
                <tbody id="quotation-body">
                    <!-- 錄入列 -->
                    <tr id="draft-row" class="bg-indigo-50/50 border-b-2 border-indigo-100 no-print">
                        <td class="p-2 text-center">
                            <button onclick="commitAndNew()" class="w-10 h-10 bg-indigo-600 text-white rounded-full font-bold shadow-lg hover:bg-indigo-700 active:scale-95 flex items-center justify-center mx-auto">+</button>
                        </td>
                        <td class="p-1"><select id="d-category" onchange="updateSubItems()" class="w-full text-xs"></select></td>
                        <td class="p-1"><select id="d-floor" class="w-full text-xs">
                            <option value="1樓">1樓</option><option value="2樓">2樓</option><option value="3樓">3樓</option><option value="4樓">4樓</option><option value="5樓">5樓</option><option value="6樓">6樓</option><option value="地下室">地下室</option><option value="頂樓">頂樓</option><option value="樓梯間">樓梯間</option>
                        </select></td>
                        <td class="p-1"><select id="d-location" class="w-full text-xs">
                            <option value="無">無</option><option value="樓梯間">樓梯間</option><option value="天花板">天花板</option><option value="地板">地板</option><option value="牆面">牆面</option><option value="客廳">客廳</option><option value="廚房">廚房</option><option value="浴室">浴室</option>
                        </select></td>
                        <td class="p-1"><select id="d-item" onchange="updatePrice()" class="w-full text-xs"></select></td>
                        <td class="p-1"><select id="d-unit" class="w-full text-xs">
                            <option value="式">式</option><option value="坪">坪</option><option value="m²">m²</option><option value="尺">尺</option><option value="組">組</option><option value="車">車</option>
                        </select></td>
                        <td class="p-1"><input id="d-qty" type="number" value="1" oninput="calculateDraft()" class="w-full text-center text-xs"></td>
                        <td class="p-1"><input id="d-price" type="number" value="0" oninput="calculateDraft()" class="w-full text-right font-bold text-xs"></td>
                        <td id="d-total" class="p-2 text-right font-bold text-indigo-800 text-xs">0</td>
                        <td></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 總結區 -->
        <div class="bg-slate-50 p-6 md:p-8 border-t flex flex-col md:flex-row justify-between gap-8">
            <div class="md:w-3/5">
                <p class="font-bold text-slate-500 mb-2 text-xs uppercase tracking-wider">◆ 計價說明與附註：</p>
                <textarea id="remarks-input" rows="4" class="w-full text-xs text-slate-500 leading-relaxed bg-white/50 border-slate-200">1. 本單價含基本施工與料件。
2. 管理費包含現場專業監工與環境維護。
3. 施工期間如遇原始結構問題需額外處置，將另行報價。
4. 本報價單自開立日起 15 日內有效。</textarea>
            </div>
            <div class="md:w-72 space-y-3 text-sm">
                <div class="flex justify-between items-center text-slate-600"><span>工程小計</span><span id="subtotal" class="font-bold">0</span></div>
                <div class="flex justify-between items-center text-slate-600"><span>管理維護 (5%)</span><span id="management-fee" class="font-bold">0</span></div>
                <div class="flex justify-between items-center text-red-500"><span>營業稅 (5%)</span><span id="tax-fee" class="font-bold">0</span></div>
                <div class="flex justify-between items-center pt-3 border-t-2 border-slate-200 text-xl font-black text-indigo-700"><span>總報價金額</span><span id="grand-total">0</span></div>
            </div>
        </div>

        <!-- 簽名區 -->
        <div class="p-6 md:p-10 grid grid-cols-2 gap-10 bg-slate-50/20 border-t">
            <div class="text-center">
                <div class="flex justify-between mb-2 items-center">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">甲方簽署 (客戶)</span>
                    <button onclick="clearSig('sig-party-a')" class="no-print text-indigo-600 text-[10px] font-bold">清除</button>
                </div>
                <canvas id="sig-party-a" class="sig-canvas rounded-lg"></canvas>
            </div>
            <div class="text-center">
                <div class="flex justify-between mb-2 items-center">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">乙方簽署 (承包商)</span>
                    <button onclick="clearSig('sig-party-b')" class="no-print text-indigo-600 text-[10px] font-bold">清除</button>
                </div>
                <canvas id="sig-party-b" class="sig-canvas rounded-lg"></canvas>
            </div>
        </div>
    </div>

    <!-- 底部版權/說明 -->
    <div class="max-w-5xl mx-auto mt-8 text-center text-slate-400 text-[10px] no-print pb-24">
        <p>© 2026 工程估價單系統 - 穩定版</p>
    </div>

    <script>
        // 工程資料庫
        const projectData = {
            "保護工程": { "items": ["公設保護(電梯/走廊)", "室內地坪保護", "家具防塵套件"], "prices": [800, 600, 3500] },
            "拆除工程": { "items": ["紅磚牆拆除", "磁磚剔除(牆/地)", "天花板拆除", "廢棄物清運費"], "prices": [2500, 1800, 1200, 9500] },
            "泥作工程": { "items": ["牆面水泥粉光", "防水工程", "地磚舖貼", "牆面砌磚"], "prices": [4500, 2500, 6500, 5500] },
            "木作工程": { "items": ["矽酸鈣板平頂天花", "系統櫃(高櫃)", "造型電視牆", "木作隔間牆"], "prices": [3800, 6500, 12000, 4500] },
            "油漆工程": { "items": ["全室二底三面漆", "局部批土修補", "造型牆跳色費"], "prices": [1500, 500, 2500] },
            "水電工程": { "items": ["開關插座面板更新", "全室電路抽換", "燈具安裝(基本)", "冷熱水管遷移"], "prices": [850, 45000, 350, 3500] }
        };

        function showMsg(text) {
            const b = document.getElementById('msg-box');
            b.innerText = text; b.style.display = 'block';
            setTimeout(() => b.style.display = 'none', 3000);
        }

        // 初始化日期與選單
        function init() {
            document.getElementById('quote-date').valueAsDate = new Date();
            const cat = document.getElementById('d-category');
            cat.innerHTML = '<option value="">--類別--</option>';
            Object.keys(projectData).forEach(c => cat.add(new Option(c, c)));
            setupSignatures();
        }

        // 更新項目下拉選單
        function updateSubItems() {
            const cat = document.getElementById('d-category').value;
            const item = document.getElementById('d-item');
            item.innerHTML = '<option value="">--項目--</option>';
            if (projectData[cat]) projectData[cat].items.forEach((it, idx) => {
                const opt = new Option(it, it);
                opt.dataset.price = projectData[cat].prices[idx];
                item.add(opt);
            });
            calculateDraft();
        }

        // 更新單價
        function updatePrice() {
            const sel = document.getElementById('d-item');
            const opt = sel.options[sel.selectedIndex];
            if (opt && opt.dataset.price) document.getElementById('d-price').value = opt.dataset.price;
            calculateDraft();
        }

        // 計算錄入行小計
        function calculateDraft() {
            const q = parseFloat(document.getElementById('d-qty').value) || 0;
            const p = parseFloat(document.getElementById('d-price').value) || 0;
            document.getElementById('d-total').innerText = Math.round(q * p).toLocaleString();
        }

        // 確認並新增至表格
        function commitAndNew() {
            const cat = document.getElementById('d-category').value;
            const item = document.getElementById('d-item').value;
            if (!cat || !item) return showMsg("請選擇類別與項目！");

            const floor = document.getElementById('d-floor').value;
            const loc = document.getElementById('d-location').value;
            const q = document.getElementById('d-qty').value;
            const p = document.getElementById('d-price').value;
            const u = document.getElementById('d-unit').value;
            const totalVal = Math.round(parseFloat(q) * parseFloat(p));

            const row = document.createElement('tr');
            row.className = "border-b text-[12px] row-entry transition-colors";
            row.innerHTML = `
                <td class="p-3 no-print text-center text-slate-300">●</td>
                <td class="p-4 font-medium text-slate-600">${cat}</td>
                <td class="p-3 text-center">${floor}</td>
                <td class="p-3 text-center">${loc}</td>
                <td class="p-4 text-slate-700">${item}</td>
                <td class="p-3 text-center text-slate-500">${u}</td>
                <td class="p-3 text-center">${q}</td>
                <td class="p-3 text-right">${parseFloat(p).toLocaleString()}</td>
                <td class="p-4 text-right font-bold text-slate-800 row-total" data-val="${totalVal}">${totalVal.toLocaleString()}</td>
                <td class="p-3 no-print text-center"><button onclick="this.closest('tr').remove();calculateTotal();" class="text-slate-300 hover:text-red-500 font-bold transition-colors">×</button></td>
            `;
            document.getElementById('quotation-body').insertBefore(row, document.getElementById('draft-row').nextSibling);
            
            // 重置錄入行
            document.getElementById('d-category').value = ""; 
            document.getElementById('d-item').innerHTML = "";
            document.getElementById('d-qty').value = 1; 
            document.getElementById('d-price').value = 0;
            calculateDraft(); 
            calculateTotal();
        }

        // 計算總額
        function calculateTotal() {
            let sub = 0;
            document.querySelectorAll('.row-total').forEach(el => sub += parseFloat(el.dataset.val) || 0);
            const mgt = Math.round(sub * 0.05); 
            const tax = Math.round((sub + mgt) * 0.05);
            document.getElementById('subtotal').innerText = sub.toLocaleString();
            document.getElementById('management-fee').innerText = mgt.toLocaleString();
            document.getElementById('tax-fee').innerText = tax.toLocaleString();
            document.getElementById('grand-total').innerText = (sub + mgt + tax).toLocaleString();
        }

        // 簽名邏輯
        function setupSignatures() {
            ['sig-party-a', 'sig-party-b'].forEach(id => {
                const canvas = document.getElementById(id);
                const ctx = canvas.getContext('2d');
                let drawing = false;
                const ratio = window.devicePixelRatio || 1;
                canvas.width = canvas.offsetWidth * ratio; 
                canvas.height = canvas.offsetHeight * ratio;
                ctx.scale(ratio, ratio);
                ctx.lineWidth = 2.5; 
                ctx.lineCap = 'round'; 
                ctx.strokeStyle = '#1e293b';
                
                const getPos = (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const cx = (e.touches ? e.touches[0].clientX : e.clientX);
                    const cy = (e.touches ? e.touches[0].clientY : e.clientY);
                    return { x: cx - rect.left, y: cy - rect.top };
                };
                const start = (e) => { drawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); if(e.touches) e.preventDefault(); };
                const move = (e) => { if(!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); if(e.touches) e.preventDefault(); };
                
                canvas.addEventListener('mousedown', start); 
                canvas.addEventListener('mousemove', move); 
                window.addEventListener('mouseup', () => drawing = false);
                canvas.addEventListener('touchstart', start, {passive:false}); 
                canvas.addEventListener('touchmove', move, {passive:false}); 
                canvas.addEventListener('touchend', () => drawing = false);
            });
        }

        function clearSig(id) { 
            const canvas = document.getElementById(id);
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            setupSignatures();
        }

        window.onload = init;
    </script>
</body>
</html>
