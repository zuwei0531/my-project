<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>工程估價單系統 - 直向專業版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

        body {
            font-family: 'Noto Sans TC', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* 隱藏 Chrome/Safari 的數字輸入箭頭 */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* 針對 A4 直向優化欄位寬度 */
        .col-cat { width: 90px; }      
        .col-floor { width: 60px; }     
        .col-loc { width: 80px; }      
        .col-desc { min-width: 140px; }  
        .col-unit { width: 50px; }
        .col-qty { width: 60px; }
        .col-price { width: 85px; }
        .col-total { width: 100px; }

        select, input, textarea { 
            border: 1px solid #e2e8f0 !important; 
            border-radius: 6px !important; 
            padding: 4px 8px !important; 
            background-color: white; 
            outline: none;
            font-size: 13px;
            transition: all 0.2s ease;
        }
        
        input:focus, textarea:focus, select:focus {
            border-color: #6366f1 !important;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .sig-canvas { 
            border: 2px dashed #cbd5e1; 
            background-color: #f8fafc; 
            cursor: crosshair; 
            touch-action: none; 
            width: 100%; 
            height: 120px; 
        }
        
        /* PDF 匯出專用調整 */
        .pdf-exporting {
            font-size: 12px !important; 
        }
        .pdf-exporting .no-print { 
            display: none !important; 
        }
        .pdf-exporting input, .pdf-exporting textarea, .pdf-exporting select { 
            border: none !important; 
            background: transparent !important; 
            padding: 0 !important; 
            box-shadow: none !important;
            appearance: none;
            font-weight: 500;
            color: #1e293b !important;
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white !important; padding: 0 !important; }
        }

        .row-entry:hover { background-color: #f8fafc; }
        #msg-box { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); z-index: 9999; display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen py-6 md:py-10 text-slate-800">

    <div id="msg-box" class="bg-slate-900 text-white px-8 py-3 rounded-full shadow-2xl font-medium text-sm animate-in fade-in zoom-in duration-300"></div>

    <!-- 功能按鈕區 -->
    <div class="no-print fixed bottom-8 right-8 flex flex-col gap-3 z-50">
        <button onclick="exportToPDF()" class="bg-indigo-600 text-white px-6 py-3 rounded-full shadow-2xl font-bold hover:bg-indigo-700 hover:-translate-y-1 transition-all flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
            下載 A4 直向 PDF
        </button>
    </div>

    <div id="quotation-content" class="max-w-[800px] mx-auto bg-white shadow-2xl rounded-xl overflow-hidden border border-slate-200">
        <!-- 表頭 -->
        <div class="bg-slate-900 text-white p-8">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-4xl font-black tracking-tighter mb-2">工程估價單</h1>
                    <p class="text-slate-400 text-xs tracking-widest uppercase">Professional Engineering Quotation</p>
                </div>
                <div class="text-right space-y-2">
                    <div class="flex justify-end items-center gap-3">
                        <span class="text-slate-500 font-bold text-[10px] uppercase">Date</span>
                        <input type="date" id="quote-date" class="bg-slate-800 border-none text-white py-1 px-2 rounded-md focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div class="flex justify-end items-center gap-3">
                        <span class="text-slate-500 font-bold text-[10px] uppercase">No.</span>
                        <input type="text" id="quote-no" value="QT-20260303-001" class="bg-slate-800 border-none text-white py-1 px-2 rounded-md text-right focus:ring-2 focus:ring-indigo-500 w-36">
                    </div>
                </div>
            </div>

            <div class="mt-8 grid grid-cols-2 gap-6">
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">客戶名稱 Client</label>
                    <input type="text" id="client-name" placeholder="請輸入單位或負責人" class="w-full bg-slate-800/50 border-none text-white placeholder:text-slate-600">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">聯絡電話 Phone</label>
                    <input type="text" id="client-phone" placeholder="請輸入聯絡電話" class="w-full bg-slate-800/50 border-none text-white placeholder:text-slate-600">
                </div>
                <div class="col-span-2 space-y-1">
                    <label class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">施工地址 Address</label>
                    <input type="text" id="client-address" placeholder="請輸入詳細施工地點" class="w-full bg-slate-800/50 border-none text-white placeholder:text-slate-600">
                </div>
            </div>
        </div>

        <!-- 表格區 -->
        <div class="px-2">
            <table class="w-full border-collapse">
                <thead>
                    <tr class="text-[11px] font-black text-slate-400 uppercase tracking-wider border-b border-slate-100">
                        <th class="p-4 no-print w-12"></th>
                        <th class="p-2 text-left col-cat">類別</th>
                        <th class="p-2 text-left col-floor">樓層</th>
                        <th class="p-2 text-left col-loc">位置</th>
                        <th class="p-2 text-left col-desc">項目說明</th>
                        <th class="p-2 text-center col-unit">單位</th>
                        <th class="p-2 text-center col-qty">數量</th>
                        <th class="p-2 text-right col-price">單價</th>
                        <th class="p-2 text-right col-total">小計</th>
                        <th class="p-2 no-print w-10"></th>
                    </tr>
                </thead>
                <tbody id="quotation-body">
                    <!-- 輸入列 -->
                    <tr id="draft-row" class="bg-indigo-50/50 no-print">
                        <td class="p-2 text-center">
                            <button onclick="commitAndNew()" class="w-8 h-8 bg-indigo-600 text-white rounded-lg shadow-lg hover:bg-indigo-700 flex items-center justify-center mx-auto transition-transform active:scale-90">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4" /></svg>
                            </button>
                        </td>
                        <td class="p-1"><select id="d-category" onchange="updateSubItems()" class="w-full"></select></td>
                        <td class="p-1">
                            <select id="d-floor" class="w-full">
                               <option value="1樓">1F</option><option value="2樓">2F</option><option value="3樓">3F</option> <option value="4樓">4F</option><option value="5樓">5F</option><option value="6樓">6F</option>
                                <option value="頂樓">頂樓</option>
                            </select>
                        </td>
                        <td class="p-1">
                            <select id="d-location" class="w-full">
                                <option value="客廳">客廳</option><option value="臥室">臥室</option><option value="浴室">浴室</option><option value="廚房">廚房</option><option value="全室">全室</option>
                            </select>
                        </td>
                        <td class="p-1"><select id="d-item" onchange="updatePrice()" class="w-full"></select></td>
                        <td class="p-1"><select id="d-unit" class="w-full"><option value="式">式</option><option value="坪">坪</option><option value="m²">m²</option><option value="口">口</option></select></td>
                        <td class="p-1"><input id="d-qty" type="number" value="1" oninput="calculateDraft()" class="w-full text-center font-bold"></td>
                        <td class="p-1"><input id="d-price" type="number" value="0" oninput="calculateDraft()" class="w-full text-right font-bold text-indigo-600"></td>
                        <td id="d-total" class="p-2 text-right font-black text-indigo-900">0</td>
                        <td></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 結算區 -->
        <div class="p-8 bg-slate-50 border-t border-slate-100 flex flex-col md:flex-row justify-between gap-8">
            <div class="flex-1">
                <div class="flex items-center gap-2 mb-3">
                    <div class="w-1.5 h-4 bg-indigo-500 rounded-full"></div>
                    <h3 class="font-bold text-slate-800 text-sm">計價備註事項 Remarks</h3>
                </div>
                <textarea id="remarks-input" rows="4" class="w-full text-xs text-slate-500 leading-relaxed p-4 bg-white border-slate-200">1. 本單價含基本施工與料件。
2. 管理費包含現場專業監工、環境保護維護費。
3. 報價有效期限為 15 天，逾期請重新洽詢。
4. 確定後請支付 30% 訂金以利安排進場。</textarea>
            </div>
            
            <div class="w-full md:w-72 space-y-3">
                <div class="flex justify-between items-center text-slate-500 text-sm">
                    <span>工程小計 Subtotal</span>
                    <span id="subtotal" class="font-bold text-slate-800 text-base">0</span>
                </div>
                <div class="flex justify-between items-center text-slate-500 text-sm">
                    <div class="flex items-center gap-2">
                        <span>管理費 (5%)</span>
                        <input type="checkbox" id="check-mgt" checked onchange="calculateTotal()" class="no-print h-4 w-4 rounded text-indigo-600">
                    </div>
                    <span id="management-fee" class="font-bold text-slate-800 text-base">0</span>
                </div>
                <div class="flex justify-between items-center text-slate-400 text-sm">
                    <div class="flex items-center gap-2">
                        <span>營業稅 (5%)</span>
                        <input type="checkbox" id="check-tax" checked onchange="calculateTotal()" class="no-print h-4 w-4 rounded text-indigo-600">
                    </div>
                    <span id="tax-fee" class="font-bold text-slate-800 text-base">0</span>
                </div>
                <div class="pt-4 border-t-2 border-slate-200 flex justify-between items-end">
                    <span class="text-slate-900 font-black text-lg">總報價 Total</span>
                    <span id="grand-total" class="text-3xl font-black text-indigo-600">0</span>
                </div>
            </div>
        </div>

        <!-- 簽署區 -->
        <div class="p-8 grid grid-cols-2 gap-10 border-t border-slate-100">
            <div>
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs font-black text-slate-400 uppercase">Party A (Client)</span>
                    <button onclick="clearSig('sig-party-a')" class="no-print text-indigo-600 text-[10px] font-bold">清除</button>
                </div>
                <canvas id="sig-party-a" class="sig-canvas rounded-xl shadow-inner"></canvas>
                <p class="text-center text-[10px] text-slate-400 mt-2">甲方客戶簽署蓋章</p>
            </div>
            <div>
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs font-black text-slate-400 uppercase">Party B (Contractor)</span>
                    <button onclick="clearSig('sig-party-b')" class="no-print text-indigo-600 text-[10px] font-bold">清除</button>
                </div>
                <canvas id="sig-party-b" class="sig-canvas rounded-xl shadow-inner"></canvas>
                <p class="text-center text-[10px] text-slate-400 mt-2">乙方承包商簽署蓋章</p>
            </div>
        </div>
    </div>

    <footer class="mt-12 text-center text-[10px] text-slate-400 no-print uppercase tracking-[0.2em] pb-10">
        Professional Quotation System © 2026
    </footer>

    <script>
        const projectData = {
            "保護工程": { "items": ["公設保護(電梯/走廊)", "室內地坪保護", "家具防塵套件"], "prices": [800, 600, 3500] },
            "拆除工程": { "items": ["全室拆除", "紅磚牆拆除", "磁磚剔除(牆/地)", "天花板拆除", "廢棄物清運費"], "prices": [2500, 2500, 1800, 1200, 9500] },
            "泥作工程": { "items": ["地面水泥粉光", "牆面水泥粉光", "防水工程", "地磚舖貼", "牆面砌磚"], "prices": [4500, 4500, 2500, 6500, 5500] },
            "木作工程": { "items": ["矽酸鈣板平頂天花", "系統櫃(每尺)", "木作隔間牆"], "prices": [3800, 6500, 4500] },
            "油漆工程": { "items": ["全室二底三面漆", "局部批土修補", "造型牆跳色費"], "prices": [1500, 500, 2500] },
            "水電工程": { "items": ["插座面板更新", "全室電路抽換", "燈具安裝(基本)"], "prices": [850, 45000, 350] }
        };

        function showMsg(text) {
            const b = document.getElementById('msg-box');
            b.innerText = text; 
            b.style.display = 'block';
            setTimeout(() => b.style.display = 'none', 3000);
        }

        function exportToPDF() {
            showMsg("正在生成直向 A4 PDF...");
            window.scrollTo(0, 0);
            
            const element = document.getElementById('quotation-content');
            const quoteNo = document.getElementById('quote-no').value || 'Quotation';
            
            document.body.classList.add('pdf-exporting');

            const opt = {
                margin:       [10, 5, 10, 5],
                filename:     `${quoteNo}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true, letterRendering: true }, 
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' } 
            };

            html2pdf().set(opt).from(element).save().then(() => {
                document.body.classList.remove('pdf-exporting');
                showMsg("下載成功！");
            });
        }

        function init() {
            document.getElementById('quote-date').valueAsDate = new Date();
            const cat = document.getElementById('d-category');
            cat.innerHTML = '<option value="">-- 選類別 --</option>';
            Object.keys(projectData).forEach(c => cat.add(new Option(c, c)));
            setupSignatures();
            calculateTotal();
        }

        function updateSubItems() {
            const cat = document.getElementById('d-category').value;
            const item = document.getElementById('d-item');
            item.innerHTML = '<option value="">-- 選項目 --</option>';
            if (projectData[cat]) projectData[cat].items.forEach((it, idx) => {
                const opt = new Option(it, it);
                opt.dataset.price = projectData[cat].prices[idx];
                item.add(opt);
            });
            calculateDraft();
        }

        function updatePrice() {
            const sel = document.getElementById('d-item');
            const opt = sel.options[sel.selectedIndex];
            if (opt && opt.dataset.price) document.getElementById('d-price').value = opt.dataset.price;
            calculateDraft();
        }

        function calculateDraft() {
            const q = parseFloat(document.getElementById('d-qty').value) || 0;
            const p = parseFloat(document.getElementById('d-price').value) || 0;
            document.getElementById('d-total').innerText = Math.round(q * p).toLocaleString();
        }

        function commitAndNew() {
            const cat = document.getElementById('d-category').value;
            const item = document.getElementById('d-item').value;
            if (!cat || !item) return showMsg("請選取類別與項目");

            const floor = document.getElementById('d-floor').value;
            const loc = document.getElementById('d-location').value;
            const q = document.getElementById('d-qty').value;
            const p = document.getElementById('d-price').value;
            const u = document.getElementById('d-unit').value;
            const totalVal = Math.round(parseFloat(q) * parseFloat(p));

            const row = document.createElement('tr');
            row.className = "border-b border-slate-50 row-entry group text-[13px] animate-in slide-in-from-left duration-300";
            
            row.innerHTML = `
                <td class="p-3 no-print text-center">
                    <div class="w-1 h-4 bg-slate-200 rounded-full mx-auto group-hover:bg-indigo-400 transition-colors"></div>
                </td>
                <td class="p-2 text-slate-500 font-medium">${cat}</td>
                <td class="p-2 font-bold text-slate-700">${floor}</td>
                <td class="p-2 text-slate-400">${loc}</td>
                <td class="p-2 text-slate-800 font-bold">${item}</td>
                <td class="p-2 text-center text-slate-500">${u}</td>
                <td class="p-2 text-center font-bold text-slate-700">${q}</td>
                <td class="p-2 text-right font-medium text-slate-600">${parseFloat(p).toLocaleString()}</td>
                <td class="p-2 text-right font-black text-slate-900 row-total" data-val="${totalVal}">${totalVal.toLocaleString()}</td>
                <td class="p-2 no-print text-center">
                    <button onclick="this.closest('tr').remove();calculateTotal();" class="text-slate-300 hover:text-red-500 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    </button>
                </td>
            `;
            document.getElementById('quotation-body').insertBefore(row, document.getElementById('draft-row').nextSibling);
            
            // 重置
            document.getElementById('d-category').value = ""; document.getElementById('d-item').innerHTML = "";
            document.getElementById('d-qty').value = 1; document.getElementById('d-price').value = 0;
            calculateDraft(); calculateTotal();
        }

        function calculateTotal() {
            let sub = 0;
            document.querySelectorAll('.row-total').forEach(el => sub += parseFloat(el.dataset.val) || 0);
            
            const useMgt = document.getElementById('check-mgt').checked;
            const useTax = document.getElementById('check-tax').checked;
            
            const mgt = useMgt ? Math.round(sub * 0.05) : 0; 
            const tax = useTax ? Math.round((sub + mgt) * 0.05) : 0;
            
            document.getElementById('subtotal').innerText = sub.toLocaleString();
            document.getElementById('management-fee').innerText = mgt.toLocaleString();
            document.getElementById('tax-fee').innerText = tax.toLocaleString();
            document.getElementById('grand-total').innerText = (sub + mgt + tax).toLocaleString();
        }

        function setupSignatures() {
            ['sig-party-a', 'sig-party-b'].forEach(id => {
                const canvas = document.getElementById(id);
                const ctx = canvas.getContext('2d');
                let drawing = false;
                
                // 處理高解析度螢幕
                const ratio = window.devicePixelRatio || 1;
                canvas.width = canvas.offsetWidth * ratio; 
                canvas.height = canvas.offsetHeight * ratio;
                ctx.scale(ratio, ratio);
                
                ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.strokeStyle = '#0f172a';
                
                const getPos = (e) => {
                    const rect = canvas.getBoundingClientRect();
                    const cx = (e.touches ? e.touches[0].clientX : e.clientX);
                    const cy = (e.touches ? e.touches[0].clientY : e.clientY);
                    return { x: cx - rect.left, y: cy - rect.top };
                };
                
                const start = (e) => { 
                    drawing = true; 
                    const p = getPos(e); 
                    ctx.beginPath(); 
                    ctx.moveTo(p.x, p.y); 
                    if(e.touches) e.preventDefault(); 
                };
                
                const move = (e) => { 
                    if(!drawing) return; 
                    const p = getPos(e); 
                    ctx.lineTo(p.x, p.y); 
                    ctx.stroke(); 
                    if(e.touches) e.preventDefault(); 
                };
                
                canvas.addEventListener('mousedown', start);
                canvas.addEventListener('mousemove', move);
                window.addEventListener('mouseup', () => drawing = false);
                
                canvas.addEventListener('touchstart', start, {passive:false});
                canvas.addEventListener('touchmove', move, {passive:false});
                canvas.addEventListener('touchend', () => drawing = false);
            });
        }

        function clearSig(id) { 
            const canvas = document.getElementById(id);
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            setupSignatures();
        }

        window.onload = init;
    </script>
</body>
</html>
